<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" role="img" aria-label="VEDMAN logo">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE99A"/>
      <stop offset="0.42" stop-color="#D79B22"/>
      <stop offset="0.72" stop-color="#FFF0A8"/>
      <stop offset="1" stop-color="#A86A08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#18C755"/>
      <stop offset="1" stop-color="#087B34"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)" font-family="Arial Black, Impact, Montserrat, Arial, sans-serif" font-weight="900" font-size="132" letter-spacing="-9">
    <!-- VED: white fill, gold outer edge, black inner edge -->
    <text x="28" y="145" fill="none" stroke="#080808" stroke-width="18" paint-order="stroke">VED</text>
    <text x="28" y="145" fill="none" stroke="url(#gold)" stroke-width="13" paint-order="stroke">VED</text>
    <text x="28" y="145" fill="#fff" stroke="#111" stroke-width="3" paint-order="stroke">VED</text>

    <!-- MAN: green fill, gold outer edge, black inner edge -->
    <text x="405" y="145" fill="none" stroke="#080808" stroke-width="18" paint-order="stroke">MAN</text>
    <text x="405" y="145" fill="none" stroke="url(#gold)" stroke-width="13" paint-order="stroke">MAN</text>
    <text x="405" y="145" fill="url(#green)" stroke="#111" stroke-width="3" paint-order="stroke">MAN</text>
  </g>

  <!-- Crown: 30° tilted, placed on the upper right of N -->
  <g transform="translate(742 42) rotate(-30) scale(.9)" filter="url(#shadow)">
    <path d="M0 63 L12 20 L43 53 L72 12 L102 53 L133 20 L146 63 Z" fill="url(#gold)" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
    <rect x="-2" y="62" width="150" height="25" rx="8" fill="url(#gold)" stroke="#111" stroke-width="5"/>
    <circle cx="12" cy="18" r="11" fill="url(#gold)" stroke="#111" stroke-width="4"/>
    <circle cx="72" cy="10" r="11" fill="url(#gold)" stroke="#111" stroke-width="4"/>
    <circle cx="133" cy="18" r="11" fill="url(#gold)" stroke="#111" stroke-width="4"/>
    <path d="M9 70 H137" stroke="#fff4b3" stroke-width="5" stroke-linecap="round" opacity=".75"/>
  </g>
</svg>

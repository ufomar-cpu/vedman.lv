<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMAPU | Tehnika un Materiāli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00b341; --dark-grey: #121212; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--dark-grey); color: var(--text); overflow-x: hidden; line-height: 1.6; }

        /* Navigācija */
        header { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(18,18,18,0.95); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333;
        }
        .logo { font-weight: 900; font-size: 1.5rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }
        
        .lang-menu { display: flex; gap: 8px; }
        .lang-btn { 
            color: #888; font-size: 0.8rem; font-weight: 700; padding: 5px 10px; 
            border: 1px solid #444; border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .lang-btn.active { color: var(--primary); border-color: var(--primary); }

        /* Galvenā daļa */
        main { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 80vh; padding: 40px 20px; text-align: center; 
        }
        
        .story-slider { height: 40px; margin-bottom: 10px; overflow: hidden; }
        .story-slide { 
            font-size: 1.8rem; font-weight: 900; text-transform: uppercase; 
            display: none; color: var(--primary); animation: fadeIn 0.5s; 
        }
        .story-slide.active { display: block; }
        
        .hero-desc { max-width: 500px; font-size: 1rem; color: #bbb; margin-bottom: 30px; }

        /* Attēlu slaidrāde */
        .slider-wrap { 
            width: 100%; max-width: 600px; height: 350px; 
            position: relative; overflow: hidden; border-radius: 20px; 
            border: 2px solid #333; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .slide-img { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; opacity: 0; transition: 1s ease-in-out; top:0; left:0; 
        }
        .slide-img.active { opacity: 1; }

        .btn-trigger { 
            background: var(--primary); color: white; padding: 18px 40px; 
            border-radius: 50px; font-weight: 900; text-transform: uppercase; 
            border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(0, 179, 65, 0.4);
        }
        .btn-trigger:hover { transform: scale(1.05); }

        /* Modālais logs */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-content { 
            background: white; color: #1a1a1a; width: 100%; max-width: 450px; 
            border-radius: 20px; padding: 30px; position: relative; 
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #999; }
        
        select, input, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
            margin: 8px 0; font-size: 1rem; outline: none; 
        }
        .btn-final { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 15px; 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">AMA<span>PU</span></a>
    <div class="lang-menu">
        <div class="lang-btn active" onclick="changeLang('lv', this)">LV</div>
        <div class="lang-btn" onclick="changeLang('ru', this)">RU</div>
        <div class="lang-btn" onclick="changeLang('eng', this)">ENG</div>
    </div>
</header>

<main>
    <div class="story-slider" id="story-slider-container">
        </div>
    <p class="hero-desc" id="hero-desc"></p>
    
    <div class="slider-wrap">
        <img src="manipul1.jpeg" class="slide-img active">
        <img src="lapas.jpeg" class="slide-img">
        <img src="grants6.jpeg" class="slide-img">
        <img src="granst.jpeg" class="slide-img">
    </div>

    <button class="btn-trigger" onclick="openModal()" id="btn-main"></button>
</main>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="margin-bottom: 20px;"></h2>
        <select id="main-cat"></select>
        <input type="text" id="adr">
        <input type="text" id="user">
        <textarea id="comm" rows="3"></textarea>
        <button class="btn-final" onclick="send()" id="b-o"></button>
    </div>
</div>

<script>
    const translations = {
        lv: {
            titles: ["Beramās kravas", "Tehnikas noma", "Demontāža"],
            desc: "Piegādājam pamatu Jūsu jaunajai mājai, ceļam un nākotnei.",
            btn: "Sākt pasūtījumu",
            m_title: "Pasūtījums",
            mats: ["Dolomīta šķembas", "Melnzeme", "Smilts", "Grants", "Tehnikas pakalpojumi"],
            adr: "Piegādes adrese", user: "Jūsu vārds", comm: "Daudzums vai papildus jautājumi",
            order_btn: "SŪTĪT UZ WHATSAPP"
        },
        ru: {
            titles: ["Сыпучие грузы", "Аренда техники", "Демонтаж"],
            desc: "Доставляем основу для вашего дома, дороги и будущего.",
            btn: "Начать заказ",
            m_title: "Заказ",
            mats: ["Доломитовый щебень", "Чернозем", "Песок", "Гравий", "Услуги техники"],
            adr: "Адрес доставки", user: "Ваше имя", comm: "Количество или доп. вопросы",
            order_btn: "ОТПРАВИТЬ В WHATSAPP"
        },
        eng: {
            titles: ["Bulk Cargo", "Equipment Rental", "Demolition"],
            desc: "Delivering the foundation for your house, road and future.",
            btn: "Start Order",
            m_title: "Order",
            mats: ["Dolomite stone", "Black soil", "Sand", "Gravel", "Equipment services"],
            adr: "Delivery address", user: "Your name", comm: "Quantity or questions",
            order_btn: "SEND TO WHATSAPP"
        }
    };

    let currentLang = 'lv';

    function changeLang(lang, btn) {
        currentLang = lang;
        const t = translations[lang];
        
        // Atjaunot pogas stilu
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Atjaunot tekstus
        document.getElementById('hero-desc').innerText = t.desc;
        document.getElementById('btn-main').innerText = t.btn;
        document.getElementById('m-title').innerText = t.m_title;
        document.getElementById('adr').placeholder = t.adr;
        document.getElementById('user').placeholder = t.user;
        document.getElementById('comm').placeholder = t.comm;
        document.getElementById('b-o').innerText = t.order_btn;

        // Atjaunot slīdošos virsrakstus
        const container = document.getElementById('story-slider-container');
        container.innerHTML = '';
        t.titles.forEach((title, i) => {
            const d = document.createElement('div');
            d.className = `story-slide ${i === 0 ? 'active' : ''}`;
            d.innerText = title;
            container.appendChild(d);
        });

        // Atjaunot izvēlni
        const sel = document.getElementById('main-cat');
        sel.innerHTML = '';
        t.mats.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.innerText = m; sel.appendChild(opt);
        });
    }

    function openModal() { document.getElementById('orderModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    function send() {
        const mat = document.getElementById('main-cat').value;
        const adr = document.getElementById('adr').value;
        const name = document.getElementById('user').value;
        const msg = `Pasūtījums: ${mat}\nAdrese: ${adr}\nVārds: ${name}\nInfo: ${document.getElementById('comm').value}`;
        window.open(`https://wa.me/37122312828?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // Automātiskās funkcijas
    let sIdx = 0;
    setInterval(() => {
        const slides = document.querySelectorAll('.story-slide');
        if(slides.length > 0) {
            slides[sIdx].classList.remove('active');
            sIdx = (sIdx + 1) % slides.length;
            slides[sIdx].classList.add('active');
        }
    }, 3000);

    let imgIdx = 0;
    setInterval(() => {
        const imgs = document.querySelectorAll('.slide-img');
        imgs[imgIdx].classList.remove('active');
        imgIdx = (imgIdx + 1) % imgs.length;
        imgs[imgIdx].classList.add('active');
    }, 4000);

    // Inicializācija
    window.onload = () => changeLang('lv', document.querySelector('.lang-btn'));
</script>

</body>
</html>

<div class="lightbox" id="lb">

  <button class="lightbox-prev" onclick="lbPrev()">‹</button>

<script src="js/nav.js"></script>
<script>
const imgs=['skemba1.jpeg','skembas4.jpeg','skembas77.jpeg','manipul1.jpeg','manipul2.jpeg','manipul4.jpeg','manipul5.jpeg','manipul6.jpeg','manipul7.jpeg','melnz1.jpeg','melnz2.jpeg','melnz3.jpeg','melnz5.jpeg','melnz9.jpeg','granst.jpeg','grants6.jpeg','lapas.jpeg','zari1.jpeg','zari2.jpeg','transp1.jpeg','transp5.jpeg','transp9.jpeg','stikls2.jpeg'];
let idx=0;
function openLb(i){idx=i;document.getElementById('lbImg').src=imgs[i];document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden';}
function closeLb(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';}
function lbPrev(){idx=(idx-1+imgs.length)%imgs.length;document.getElementById('lbImg').src=imgs[idx];}
function lbNext(){idx=(idx+1)%imgs.length;document.getElementById('lbImg').src=imgs[idx];}
document.getElementById('lb').addEventListener('click',function(e){if(e.target===this)closeLb();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLb();if(e.key==='ArrowLeft')lbPrev();if(e.key==='ArrowRight')lbNext();});
</script>
